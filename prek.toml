# rag-blog — prek (https://prek.j178.dev)
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-added-large-files" },
    { id = "check-yaml" },
    { id = "check-toml" },
]

[[repos]]
repo = "local"
hooks = [
    {
        id = "ruff-check",
        name = "Ruff lint",
        entry = "uv run ruff check .",
        language = "system",
        pass_filenames = false,
        types = ["python"],
    },
    {
        id = "ruff-format",
        name = "Ruff format",
        entry = "uv run ruff format --check .",
        language = "system",
        pass_filenames = false,
        types = ["python"],
    },
    {
        id = "ty-check",
        name = "ty typecheck",
        entry = "uv run ty check",
        language = "system",
        pass_filenames = false,
        types = ["python"],
    },
    {
        id = "unittest",
        name = "Unit tests (chunker)",
        entry = "uv run python -m unittest discover -s tests -v",
        language = "system",
        pass_filenames = false,
        stages = ["manual", "pre-push"],
    },
    {
        id = "css-lint",
        name = "CSS lint (@media balance, body.index print, no inline styles)",
        entry = "python scripts/css_lint.py",
        language = "system",
        pass_filenames = false,
        # Fast (sub-second, stdlib-only), safe to run on every commit.
        # No `types` filter so it always runs -- the script reads
        # fixed paths (theme/style.css, lessons/*.html, reference/*.html)
        # regardless of which files were staged.
    },
]
